# Development override — adds hot-reload, exposes ports, mounts source
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug"
    environment:
      - APP_ENV=development
    volumes:
      - ./backend:/app

  worker:
    command: celery -A app.workers.celery_app worker --loglevel=debug --concurrency=2 -Q celery,video,audio
    volumes:
      - ./backend:/app

  frontend:
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
